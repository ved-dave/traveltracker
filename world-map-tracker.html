<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 1.5rem; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1rem; }
    button {
      font-size: 11px; padding: 3px 10px; border-radius: 6px;
      border: 0.5px solid #aaa; background: transparent; cursor: pointer;
    }
    button:hover { background: #eee; }
    #home-btn { border: 1.5px solid #9B59B6; color: #9B59B6; }
    input[type=color] { width: 36px; height: 28px; border: none; cursor: pointer; border-radius: 4px; padding: 0; }
    #map-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 0.5px solid #ccc; border-radius: 8px; background: #b8d4e8; cursor: grab; }
    #map-outer:active { cursor: grabbing; }
    #map-container { min-width: 900px; height: 520px; position: relative; }
  </style>
</head>
<body>
<h1>World Map Tracker</h1>

<div style="font-family: system-ui, sans-serif; padding: 0.5rem 0;">

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
    <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
      <span style="font-size:11px; color:#666;">click to cycle:</span>
      <span id="leg-unvisited" style="font-size:11px; padding:2px 9px; border-radius:20px; cursor:pointer;" onclick="openColorPicker('unvisited')">unvisited</span>
      <span id="leg-visited"   style="font-size:11px; padding:2px 9px; border-radius:20px; cursor:pointer; color:white;" onclick="openColorPicker('visited')">visited</span>
      <span id="leg-lived"     style="font-size:11px; padding:2px 9px; border-radius:20px; cursor:pointer; color:white;" onclick="openColorPicker('lived')">lived</span>
      <span id="leg-home"      style="font-size:11px; padding:2px 9px; border-radius:20px; cursor:pointer; color:white;" onclick="openColorPicker('home')">home</span>
      <span style="font-size:10px; color:#888;">(click label to recolor)</span>
    </div>
    <div style="display:flex; gap:6px; align-items:center;">
      <button id="home-btn" onclick="toggleHomeMode()">set home</button>
      <button onclick="resetZoom()">reset view</button>
      <button onclick="clearAll()">clear all</button>
    </div>
  </div>

  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:10px;">
    <div style="background:#efefed; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#666;">visited</div><div style="font-size:20px; font-weight:500;" id="stat-visited">0</div></div>
    <div style="background:#efefed; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#666;">lived</div><div style="font-size:20px; font-weight:500;" id="stat-lived">0</div></div>
    <div style="background:#efefed; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#666;">home</div><div style="font-size:20px; font-weight:500;" id="stat-home">0</div></div>
    <div style="background:#efefed; border-radius:8px; padding:8px; text-align:center;"><div style="font-size:10px; color:#666;">regions</div><div style="font-size:20px; font-weight:500;" id="stat-total">0</div></div>
  </div>

  <div id="color-picker-panel" style="display:none; background:#efefed; border:0.5px solid #ccc; border-radius:8px; padding:10px 14px; margin-bottom:10px; align-items:center; gap:12px; flex-wrap:wrap;">
    <span id="cp-label" style="font-size:12px; color:#666;">color for:</span>
    <input type="color" id="cp-input">
    <button onclick="applyColor()">apply</button>
    <button onclick="closeColorPicker()">cancel</button>
  </div>

  <div id="tooltip" style="position:fixed; background:white; border:0.5px solid #ccc; border-radius:8px; padding:5px 11px; font-size:12px; pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:100; white-space:nowrap;"></div>

  <div id="home-banner" style="display:none; background:#f3eafe; border:1px solid #9B59B6; border-radius:8px; padding:6px 12px; margin-bottom:8px; font-size:12px; color:#6c3483; text-align:center;">
    Home mode — click a region to set as your home base
  </div>

  <div id="map-outer">
    <div id="map-container">
      <svg id="world-map" style="width:100%; height:100%; display:block;"></svg>
      <div id="map-loading" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:#555; background:#b8d4e8;">Loading map…</div>
      <div id="res-badge"  style="position:absolute; bottom:8px; right:8px; font-size:10px; padding:2px 8px; background:rgba(255,255,255,0.8); border-radius:10px; color:#555; display:none;">hi-res</div>
      <div id="zoom-badge" style="position:absolute; bottom:8px; left:8px;  font-size:10px; padding:2px 8px; background:rgba(255,255,255,0.8); border-radius:10px; color:#555;">1x</div>
    </div>
  </div>

  <div id="selected-info" style="margin-top:6px; font-size:12px; color:#666; min-height:18px; text-align:center;"></div>

</div>

let STATUS_COLORS = { unvisited:'#c8d8e0', visited:'#1D9E75', lived:'#D85A30', home:'#9B59B6' };
const STATUS_CYCLE  = ['unvisited','visited','lived'];
const STATUS_LABELS = { unvisited:'Unvisited', visited:'Visited', lived:'Lived here', home:'Home' };

let regionStatus = {}, homeRegion = null, homeMode = false;
let svg, g, projection, geoPath, zoom, currentK = 1;
let isDragging = false, dragStartPos = null;
let hiResLoaded = false, hiResWorld = null;

function getStatus(id)  { return regionStatus[id] || 'unvisited'; }
function nextStatus(id) {
  const cur = getStatus(id);
  if (cur === 'home') return 'unvisited';
  return STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur)+1) % STATUS_CYCLE.length];
}
function getColor(id) { return STATUS_COLORS[getStatus(id)]; }

function updateLegend() {
  document.getElementById('leg-unvisited').style.background = STATUS_COLORS.unvisited;
  document.getElementById('leg-unvisited').style.color = '#444';
  document.getElementById('leg-visited').style.background = STATUS_COLORS.visited;
  document.getElementById('leg-lived').style.background   = STATUS_COLORS.lived;
  document.getElementById('leg-home').style.background    = STATUS_COLORS.home;
}

function updateStats() {
  const c = { visited:0, lived:0, home:0 };
  Object.values(regionStatus).forEach(s => { if (c[s]!==undefined) c[s]++; });
  ['visited','lived','home'].forEach(k => document.getElementById('stat-'+k).textContent = c[k]);
  try { localStorage.setItem('wmtv4', JSON.stringify({regionStatus, homeRegion, colors:STATUS_COLORS})); } catch(e){}
}

function repaintAll() {
  if (g) g.selectAll('path[data-rid]').each(function() {
    const id = d3.select(this).attr('data-rid');
    if (id) d3.select(this).attr('fill', getColor(id));
  });
}

function setHomeRegion(id, name) {
  if (homeRegion && homeRegion !== id) regionStatus[homeRegion] = 'lived';
  homeRegion = id;
  regionStatus[id] = 'home';
  repaintAll();
  document.getElementById('selected-info').textContent = name + ': Home base set';
  updateStats();
}

function toggleHomeMode() {
  homeMode = !homeMode;
  const btn = document.getElementById('home-btn');
  btn.style.background = homeMode ? '#9B59B6' : 'transparent';
  btn.style.color = homeMode ? 'white' : '#9B59B6';
  document.getElementById('home-banner').style.display = homeMode ? 'block' : 'none';
}

let cpTarget = null;
function openColorPicker(status) {
  cpTarget = status;
  document.getElementById('color-picker-panel').style.display = 'flex';
  document.getElementById('cp-label').textContent = 'Color for: ' + STATUS_LABELS[status];
  document.getElementById('cp-input').value = STATUS_COLORS[status];
}
function closeColorPicker() { document.getElementById('color-picker-panel').style.display='none'; cpTarget=null; }
function applyColor() {
  if (!cpTarget) return;
  STATUS_COLORS[cpTarget] = document.getElementById('cp-input').value;
  updateLegend(); repaintAll(); updateStats(); closeColorPicker();
}

function makePaths(sel, features, idFn, nameFn, cls, sw) {
  sel.selectAll('.'+cls+'-path')
    .data(features, d => idFn(d))
    .join('path')
    .attr('class', cls+'-path')
    .attr('d', geoPath)
    .attr('fill', d => getColor(idFn(d)))
    .attr('stroke', '#fff')
    .attr('stroke-width', sw / currentK)
    .attr('data-rid', d => idFn(d))
    .style('cursor','pointer')
    .on('mouseover', function(event,d) {
      if (isDragging) return;
      d3.select(this).raise().attr('stroke','#222').attr('stroke-width',(sw*3)/currentK);
      const tip = document.getElementById('tooltip');
      tip.innerHTML = '<strong>'+nameFn(d)+'</strong>&nbsp;&nbsp;<span style="color:#888">'+STATUS_LABELS[getStatus(idFn(d))]+'</span>';
      tip.style.opacity = '1';
    })
    .on('mousemove', function(event) {
      if (isDragging) { document.getElementById('tooltip').style.opacity='0'; return; }
      const tip = document.getElementById('tooltip');
      tip.style.left = (event.clientX+14)+'px';
      tip.style.top  = (event.clientY-36)+'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke','#fff').attr('stroke-width', sw/currentK);
      document.getElementById('tooltip').style.opacity='0';
    })
    .on('click', function(event,d) {
      if (isDragging) return;
      event.stopPropagation();
      const id = idFn(d), name = nameFn(d);
      if (homeMode) { setHomeRegion(id,name); toggleHomeMode(); return; }
      const next = nextStatus(id);
      if (next==='unvisited') delete regionStatus[id]; else regionStatus[id]=next;
      if (id===homeRegion && next!=='home') homeRegion=null;
      d3.select(this).attr('fill', getColor(id));
      document.getElementById('selected-info').textContent = name+': '+STATUS_LABELS[next];
      updateStats();
    });
}

function updateStrokeWidths(k) {
  if (!g) return;
  g.selectAll('.country-path').attr('stroke-width', 0.5/k);
  g.selectAll('.us-state-path,.ca-prov-path').attr('stroke-width', 0.3/k);
}

function buildMap(world, usStates) {
  document.getElementById('map-loading').style.display = 'none';
  const W = 1200, H = 520;
  document.getElementById('map-container').style.minWidth = W+'px';

  svg = d3.select('#world-map').attr('viewBox','0 0 '+W+' '+H);
  projection = d3.geoMercator().scale(W/6.4).center([0,20]).translate([W/2,H/2]);
  geoPath = d3.geoPath().projection(projection);

  zoom = d3.zoom()
    .scaleExtent([1,300])
    .on('start', function(event) {
      isDragging = false;
      if (event.sourceEvent && event.sourceEvent.type==='mousedown')
        dragStartPos = [event.sourceEvent.clientX, event.sourceEvent.clientY];
    })
    .on('zoom', function(event) {
      const t = event.transform;
      currentK = t.k;
      g.attr('transform', t);
      updateStrokeWidths(t.k);
      document.getElementById('zoom-badge').textContent = Math.round(t.k)+'x';
      document.getElementById('res-badge').style.display = t.k>=4 ? 'block':'none';
      if (event.sourceEvent && dragStartPos) {
        const dx = event.sourceEvent.clientX-dragStartPos[0];
        const dy = event.sourceEvent.clientY-dragStartPos[1];
        if (Math.sqrt(dx*dx+dy*dy)>4) isDragging=true;
      }
    })
    .on('end', function() { setTimeout(()=>{ isDragging=false; }, 50); });

  svg.call(zoom);
  g = svg.append('g');

  const EXCLUDE = new Set(['840','124']);
  const countries = topojson.feature(world, world.objects.countries).features.filter(d=>!EXCLUDE.has(String(d.id)));
  const usF = topojson.feature(usStates, usStates.objects.states).features;
  const caF = CA_GEOJSON.features || [];

  const gC = g.append('g').attr('class','layer-countries');
  const gU = g.append('g').attr('class','layer-us');
  const gA = g.append('g').attr('class','layer-ca');

  makePaths(gC, countries, d=>'c_'+d.id,  d=>d.properties.name||'Country',  'country',  0.5);
  makePaths(gU, usF,       d=>'us_'+d.id, d=>d.properties.name||'State',    'us-state', 0.3);
  makePaths(gA, caF,       d=>'ca_'+(d.properties['hc-a2']||d.properties.name||d.id),
                           d=>d.properties.name||d.properties['hc-a2']||'Province', 'ca-prov', 0.3);

  document.getElementById('stat-total').textContent = countries.length + usF.length + caF.length;

  try {
    const saved = localStorage.getItem('wmtv4');
    if (saved) {
      const data = JSON.parse(saved);
      regionStatus = data.regionStatus||{};
      homeRegion   = data.homeRegion||null;
      if (data.colors) { Object.assign(STATUS_COLORS, data.colors); updateLegend(); }
      repaintAll();
    }
  } catch(e){}

  updateStats(); updateLegend();
}

window.resetZoom = function() { svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity); };
window.clearAll  = function() {
  regionStatus={}; homeRegion=null; repaintAll();
  try { localStorage.removeItem('wmtv4'); } catch(e){}
  updateStats();
  document.getElementById('selected-info').textContent='';
};

Promise.all([
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
]).then(([world, usStates]) => {
  buildMap(world, usStates);
  return d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').catch(()=>null);
}).then(worldHi => {
  if (!worldHi) return;
  hiResWorld = worldHi; hiResLoaded = true;
  zoom.on('zoom.hires', function(event) {
    if (event.transform.k >= 4 && hiResLoaded) {
      const EXCLUDE = new Set(['840','124']);
      const hi = topojson.feature(hiResWorld, hiResWorld.objects.countries).features.filter(d=>!EXCLUDE.has(String(d.id)));
      makePaths(g.select('.layer-countries'), hi, d=>'c_'+d.id, d=>d.properties.name||'Country','country',0.5);
      updateStrokeWidths(currentK);
      zoom.on('zoom.hires',null);
    }
  });
}).catch(()=>{});
</script>
</body>
</html>
